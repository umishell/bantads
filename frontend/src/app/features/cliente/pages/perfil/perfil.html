<div class="container-perfil">
  <h2 class="titulo">Alteração de Perfil</h2>

  <div *ngIf="errorMessage" class="alert alert-danger">{{ errorMessage }}</div>
  <div *ngIf="successMessage" class="alert alert-success">{{ successMessage }}</div>

  <form [formGroup]="perfilForm" (ngSubmit)="salvar()" *ngIf="!loading; else spinner">
    <div class="grid-form">
      <div class="field full">
        <label for="nome">Nome Completo</label>
        <input id="nome" type="text" formControlName="nome" class="form-control" [class.is-invalid]="isInvalid('nome')">
      </div>

      <div class="field">
        <label for="email">E-mail</label>
        <input id="email" type="email" formControlName="email" class="form-control" [class.is-invalid]="isInvalid('email')">
      </div>

      <div class="field">
        <label for="cpf">CPF (Não alterável)</label>
        <input id="cpf" type="text" formControlName="cpf" class="form-control input-readonly">
      </div>

      <div class="field">
        <label for="salario">Salário Mensal (R$)</label>
        <input id="salario" type="number" formControlName="salario" class="form-control" [class.is-invalid]="isInvalid('salario')">
      </div>

      <div class="field full">
        <label for="endereco">Endereço</label>
        <input id="endereco" type="text" formControlName="endereco" class="form-control" [class.is-invalid]="isInvalid('endereco')">
      </div>

      <div class="field">
        <label for="cep">CEP</label>
        <input id="cep" type="text" formControlName="cep" class="form-control" [class.is-invalid]="isInvalid('cep')">
      </div>

      <div class="field">
        <label for="cidade">Cidade</label>
        <input id="cidade" type="text" formControlName="cidade" class="form-control" [class.is-invalid]="isInvalid('cidade')">
      </div>

      <div class="field">
        <label for="estado">Estado</label>
        <input id="estado" type="text" formControlName="estado" class="form-control" [class.is-invalid]="isInvalid('estado')">
      </div>
    </div>

    <div class="acoes">
      <button type="submit" class="btn btn-success" [disabled]="salvando">
        {{ salvando ? 'Salvando...' : 'Salvar Alterações' }}
      </button>
    </div>
  </form>

  <ng-template #spinner>
    <div class="text-center p-5">
      <span>Carregando dados...</span>
    </div>
  </ng-template>
</div>
