<h2>Saque</h2>

<label for="valor-saque">Valor:</label>
<input
  id="valor-saque"
  type="number"
  [(ngModel)]="valor"
  min="0.01"
  step="0.01"
  placeholder="Digite o valor"
/>

<br /><br />

<button type="button" (click)="sacar()">Sacar</button>

@if (mensagem) {
  <p>{{ mensagem }}</p>
}

@if (erro) {
  <p>{{ erro }}</p>
}
