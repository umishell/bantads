<h2>Depósito</h2>

<label for="valor-deposito">Valor:</label>
<input
  id="valor-deposito"
  type="number"
  [(ngModel)]="valor"
  min="0.01"
  step="0.01"
  placeholder="Digite o valor"
/>

<br /><br />

<button type="button" (click)="depositar()">Depositar</button>

@if (mensagem) {
  <p>{{ mensagem }}</p>
}

@if (erro) {
  <p>{{ erro }}</p>
}
