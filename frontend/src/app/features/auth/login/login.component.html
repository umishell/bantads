<div class="auth-page bank-page">
  <header class="auth-header">
    <span class="auth-mark">BT</span>
    <div>
      <strong>BANTADS</strong>
      <span class="auth-sub">Acesso ao internet banking</span>
    </div>
  </header>

  <section class="auth-card">
    <h1>Entrar</h1>
    <p class="auth-lead">Use o e-mail cadastrado e a senha do ms-auth (via gateway).</p>

    <div *ngIf="erro" class="feedback feedback--error">{{ erro }}</div>

    <form [formGroup]="form" (ngSubmit)="enviar()" class="auth-form">
      <label>
        <span>E-mail (login)</span>
        <input
          type="email"
          formControlName="login"
          autocomplete="username"
          inputmode="email"
          placeholder="usuario@bantads.com.br"
          [class.is-invalid]="isInvalid('login')"
          (blur)="normalizarLogin()"
        />
        <small *ngIf="isInvalid('login')" class="field-error">{{ getErrorMessage('login') }}</small>
      </label>
      <label>
        <span>Senha</span>
        <input
          type="password"
          formControlName="senha"
          autocomplete="current-password"
          placeholder="Mínimo 4 caracteres"
          [class.is-invalid]="isInvalid('senha')"
        />
        <small *ngIf="isInvalid('senha')" class="field-error">{{ getErrorMessage('senha') }}</small>
      </label>
      <app-processando-button type="submit" [loading]="carregando" buttonClass="button button--primary">
        Entrar
      </app-processando-button>
    </form>

    <p class="auth-footer">
      Não tem cadastro?
      <a routerLink="/auth/autocadastro">Autocadastro</a>
    </p>
  </section>
</div>
