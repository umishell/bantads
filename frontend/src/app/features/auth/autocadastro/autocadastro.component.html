<div class="auth-page bank-page">
  <header class="auth-header">
    <span class="auth-mark">BT</span>
    <div>
      <strong>BANTADS</strong>
      <span class="auth-sub">Autocadastro de cliente (R1)</span>
    </div>
  </header>

  <section class="auth-card auth-card--wide">
    <h1>Novo cadastro</h1>
    <p class="auth-lead">
      Os dados são enviados para <code>POST /api/clientes</code>. Após aprovação de um gerente, a
      senha será enviada por e-mail.
    </p>

    <div *ngIf="erro" class="feedback feedback--error">{{ erro }}</div>
    <div *ngIf="sucesso" class="feedback feedback--success">{{ sucesso }}</div>

    <form [formGroup]="form" (ngSubmit)="enviar()" class="autocadastro-grid">
      <label>
        <span>Nome completo</span>
        <input
          type="text"
          formControlName="nome"
          autocomplete="name"
          maxlength="200"
          [class.is-invalid]="isInvalid('nome')"
          (blur)="normalizarCampos()"
        />
        <small *ngIf="isInvalid('nome')" class="field-error">{{ getErrorMessage('nome') }}</small>
      </label>
      <label>
        <span>E-mail</span>
        <input
          type="email"
          formControlName="email"
          autocomplete="email"
          inputmode="email"
          maxlength="200"
          placeholder="usuario@bantads.com.br"
          [class.is-invalid]="isInvalid('email')"
          (blur)="normalizarCampos()"
        />
        <small *ngIf="isInvalid('email')" class="field-error">{{ getErrorMessage('email') }}</small>
      </label>
      <label>
        <span>CPF (11 dígitos)</span>
        <input
          type="text"
          formControlName="cpf"
          inputmode="numeric"
          autocomplete="off"
          placeholder="000.000.000-00"
          [class.is-invalid]="isInvalid('cpf')"
          (input)="onCpfInput($event)"
          (blur)="aplicarMascaras()"
        />
        <small *ngIf="isInvalid('cpf')" class="field-error">{{ getErrorMessage('cpf') }}</small>
      </label>
      <label>
        <span>Telefone</span>
        <input
          type="tel"
          formControlName="telefone"
          autocomplete="tel"
          inputmode="numeric"
          placeholder="(41)99235-8764"
          [class.is-invalid]="isInvalid('telefone')"
          (input)="onTelefoneInput($event)"
          (blur)="aplicarMascaras()"
        />
        <small *ngIf="isInvalid('telefone')" class="field-error">{{ getErrorMessage('telefone') }}</small>
      </label>
      <label>
        <span>Salário (mensal)</span>
        <input
          type="number"
          step="0.01"
          min="0.01"
          formControlName="salario"
          inputmode="decimal"
          placeholder="4500.00"
          [class.is-invalid]="isInvalid('salario')"
        />
        <small *ngIf="isInvalid('salario')" class="field-error">{{ getErrorMessage('salario') }}</small>
      </label>
      <label class="span-2">
        <span>Endereço (logradouro e número)</span>
        <input
          type="text"
          formControlName="endereco"
          autocomplete="street-address"
          maxlength="255"
          [class.is-invalid]="isInvalid('endereco')"
        />
        <small *ngIf="isInvalid('endereco')" class="field-error">{{ getErrorMessage('endereco') }}</small>
      </label>
      <label>
        <span>CEP</span>
        <input
          type="text"
          formControlName="cep"
          inputmode="numeric"
          autocomplete="postal-code"
          placeholder="80010-000"
          [class.is-invalid]="isInvalid('cep') || cepErro"
          (input)="onCepInput($event)"
          (blur)="onCepBlur()"
        />
        <small *ngIf="buscandoCep" class="field-hint">Buscando endereço...</small>
        <small *ngIf="!buscandoCep && cepInfo" class="field-hint">{{ cepInfo }}</small>
        <small *ngIf="cepErro" class="field-error">{{ cepErro }}</small>
        <small *ngIf="isInvalid('cep') && !cepErro" class="field-error">{{ getErrorMessage('cep') }}</small>
      </label>
      <label>
        <span>Cidade</span>
        <input
          type="text"
          formControlName="cidade"
          autocomplete="address-level2"
          maxlength="120"
          [class.is-invalid]="isInvalid('cidade')"
        />
        <small *ngIf="isInvalid('cidade')" class="field-error">{{ getErrorMessage('cidade') }}</small>
      </label>
      <label>
        <span>UF (2 letras)</span>
        <input
          type="text"
          formControlName="estado"
          autocomplete="address-level1"
          maxlength="2"
          placeholder="PR"
          [class.is-invalid]="isInvalid('estado')"
          (blur)="normalizarCampos()"
        />
        <small *ngIf="isInvalid('estado')" class="field-error">{{ getErrorMessage('estado') }}</small>
      </label>

      <div class="span-2 autocadastro-actions">
        <app-processando-button type="submit" [loading]="carregando" buttonClass="button button--primary">
          Enviar solicitação
        </app-processando-button>
        <a routerLink="/auth/login" class="button button--ghost">Voltar ao login</a>
      </div>
    </form>
  </section>
</div>
