server:
  port: 8081
  servlet:
    context-path: /auth
  error:
    include-message: always

spring:
  application:
    name: ms-auth

  # Spring Boot 4: URI de conexão em spring.mongodb (não spring.data.mongodb).
  # Compose: SPRING_MONGODB_URI=mongodb://mongo-auth:27017/auth_db
  mongodb:
    uri: ${SPRING_MONGODB_URI:mongodb://localhost:27017/auth_db}

  # Propriedades que ainda vivem sob spring.data.mongodb (migration guide Boot 4).
  data:
    mongodb:
      auto-index-creation: true

  rabbitmq:
    host: ${SPRING_RABBITMQ_HOST:localhost}
    port: ${SPRING_RABBITMQ_PORT:5672}
    username: ${SPRING_RABBITMQ_USERNAME:guest}
    password: ${SPRING_RABBITMQ_PASSWORD:guest}
    template:
      retry:
        enabled: true
        initial-interval: 3s
        max-attempts: 3

  jackson:
    date-format: yyyy-MM-dd'T'HH:mm:ss
    time-zone: GMT-3
    deserialization:
      fail-on-unknown-properties: false

management:
  endpoints:
    web:
      exposure:
        include: health, info
  endpoint:
    health:
      show-details: always

jwt:
  secret: ${JWT_SECRET:7a56403163745262704573315a6b3164746b386153646c7a4d31354a726e3230}
  expiration: ${JWT_EXPIRATION_MS:3600000}

logging:
  level:
    root: INFO
    bantads.auth: DEBUG
