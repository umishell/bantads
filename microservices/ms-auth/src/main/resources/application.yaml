server:
  port: 8081
  servlet:
    context-path: /auth
  error:
    include-message: always

spring:
  application:
    name: ms-auth

  # Conexão: Spring Boot 4 usa spring.mongodb.* (spring.data.mongodb.uri não alimenta mais o cliente).
  mongodb:
    uri: ${SPRING_MONGODB_URI:${SPRING_DATA_MONGODB_URI:mongodb://${MONGO_HOST:localhost}:27017/auth_db}}

  data:
    mongodb:
      auto-index-creation: true

  rabbitmq:
    host: ${RABBIT_HOST:localhost}
    port: 5672
    username: ${RABBIT_USER:guest}
    password: ${RABBIT_PASSWORD:guest}
    template:
      retry:
        enabled: true
        initial-interval: 3s
        max-attempts: 3

  jackson:
    date-format: yyyy-MM-dd'T'HH:mm:ss
    time-zone: GMT-3
    deserialization:
      fail-on-unknown-properties: false

management:
  endpoints:
    web:
      exposure:
        include: health, info
  endpoint:
    health:
      show-details: always

jwt:
  secret: ${JWT_SECRET:7a56403163745262704573315a6b3164746b386153646c7a4d31354a726e3230}
  expiration: 3600000

logging:
  level:
    root: INFO
    bantads.auth: DEBUG
