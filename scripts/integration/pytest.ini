[pytest]
testpaths = tests
python_files = test_*.py
addopts = -ra --strict-markers
timeout_method = thread
markers =
    saga: fluxos assíncronos (RabbitMQ / saga de aprovação)
    gateway: chamadas via API Gateway (JWT / ACL)
    seed: validação do seed PDF após reboot (test_00)
    timeout(duration): limite por teste (plugin pytest-timeout; ver @pytest.mark.timeout)
