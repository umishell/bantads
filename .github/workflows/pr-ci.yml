name: PR CI

on:
  pull_request:
    branches:
      - main
      - legacyMain

jobs:
  frontend:
    name: Frontend (Angular) - Lint, Test & Build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install Dependencies
        run: npm ci

      - name: Run Lint
        run: npm run lint --if-present

      - name: Prettier Format Check
        run: npx prettier --check "src/**/*.{ts,html,scss,json}"
        continue-on-error: true


      - name: Run Unit Tests (Karma headless)
        run: npx ng test --watch=false --browsers=ChromeHeadless --code-coverage=false

      - name: Run Build
        run: npm run build

  gateway:
    name: API Gateway (Fastify) - Lint & Validate
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: gateway

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: gateway/package-lock.json

      - name: Install Dependencies
        run: npm ci

      - name: Run Lint
        run: npm run lint --if-present

      - name: Run Unit Tests
        run: npm test --if-present

      - name: Syntax Check (entry-point)
        run: node --check src/app.js

  microservices:
    name: ${{ matrix.service }} (Spring Boot/Kotlin) - Test & Build
    runs-on: ubuntu-latest

    strategy:
      fail-fast: false
      matrix:
        service:
          - ms-auth
          - ms-cliente
          - ms-conta
          - ms-gerente
          - ms-email
          - ms-saga-orchestrator

    defaults:
      run:
        working-directory: microservices/${{ matrix.service }}

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up JDK 24 (Temurin)
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '24'

      - name: Setup Gradle (com cache)
        uses: gradle/actions/setup-gradle@v4
        with:
          build-root-directory: microservices/${{ matrix.service }}

      - name: Grant execute permission for gradlew
        run: chmod +x ./gradlew

      
      - name: Run Lint & Unit Tests (gradle check)
        run: ./gradlew check --no-daemon --stacktrace -PexcludeIntegration

      - name: Run Build (sem repetir testes)
        run: ./gradlew build -x test --no-daemon
